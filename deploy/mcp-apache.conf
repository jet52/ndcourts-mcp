# Apache 2.4 vhost for ndcourts-mcp on a dedicated subdomain.
# Use when an existing Apache install is already fronting :80/:443 and you
# want to add an MCP endpoint without disturbing it.
#
# Install:
#   1. Replace MCP_HOST throughout (the rendered file is what Apache reads):
#        sudo sed "s/MCP_HOST/mcp.example.com/g" deploy/mcp-apache.conf \
#          | sudo tee /etc/apache2/sites-available/mcp.example.com.conf
#   2. Enable required modules (idempotent):
#        sudo a2enmod proxy proxy_http headers auth_basic authn_file ssl rewrite
#   3. Create the bcrypt htpasswd file (one line per user):
#        sudo htpasswd -cB /etc/apache2/mcp.htpasswd teammate1
#        sudo chown root:www-data /etc/apache2/mcp.htpasswd
#        sudo chmod 640 /etc/apache2/mcp.htpasswd
#   4. Enable the site and reload Apache (the :443 block is guarded by
#      <IfFile>, so Apache starts cleanly before the cert exists):
#        sudo a2ensite mcp.example.com
#        sudo systemctl reload apache2
#   5. Issue the TLS cert. --apache uses HTTP-01 over the :80 vhost below:
#        sudo certbot certonly --apache -d mcp.example.com
#        sudo systemctl reload apache2
#
# Update:
#   - add/remove users:  htpasswd -B /etc/apache2/mcp.htpasswd <user> + reload
#   - cert renewal:      certbot's systemd timer handles it automatically

<VirtualHost *:80>
    ServerName MCP_HOST

    # Keep /.well-known/acme-challenge/ reachable for cert renewal; redirect
    # everything else to HTTPS.
    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# The :443 block activates only after certbot has populated the cert files.
# This lets `a2ensite` + reload succeed on a fresh install before step 5.
<IfFile "/etc/letsencrypt/live/MCP_HOST/fullchain.pem">
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName MCP_HOST

    ErrorLog  ${APACHE_LOG_DIR}/MCP_HOST-error.log
    CustomLog ${APACHE_LOG_DIR}/MCP_HOST-access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile    /etc/letsencrypt/live/MCP_HOST/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/MCP_HOST/privkey.pem

    # --- HTTP Basic Auth ---
    # TLS is mandatory here: credentials ride every request.
    <Location />
        AuthType Basic
        AuthName "ndcourts MCP"
        AuthUserFile /etc/apache2/mcp.htpasswd
        Require valid-user
    </Location>

    # --- Reverse proxy to the localhost-only systemd service ---
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 120

    <Location />
        ProxyPass        http://127.0.0.1:8000/ flushpackets=on
        ProxyPassReverse http://127.0.0.1:8000/

        # MCP can return text/event-stream; defeat buffering & compression
        # so SSE chunks reach the client as they're produced.
        SetEnv proxy-sendchunked 1
        RequestHeader unset Accept-Encoding
        Header set X-Accel-Buffering "no"
    </Location>

    # Cap request bodies — JSON-RPC payloads are tiny.
    LimitRequestBody 262144
</VirtualHost>
</IfModule>
</IfFile>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
